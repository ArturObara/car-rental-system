version: '3.8'

services:
  db:
    image: postgres:15
    container_name: car_rental_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: car_rental
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: car_rental_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:admin123@db:5432/car_rental
    depends_on:
      - db

volumes:
  postgres_data: